; NURA flight build without LoRa and GPS.
; This folder is a standalone copy for the current PCB when the rocket flies
; without radio telemetry/uplink and without the GNSS module.

[platformio]
default_envs = main

[teensy_upload_retry]
upload_protocol = custom
upload_command = python3 tools/platformio_teensy_upload_retry.py $SOURCE

[env]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = ${teensy_upload_retry.upload_protocol}
upload_command = ${teensy_upload_retry.upload_command}
monitor_speed = 115200
lib_deps =
  adafruit/Adafruit LIS331@^1.0.6
  adafruit/Adafruit MPL3115A2 Library@^2.1.2
lib_ignore =
  RadioLib
build_src_filter =
  +<*>
  -<hal/lsm6dso32_hal.cpp>
  -<hal/lsm6dsox_hal.cpp>
  -<hal/lis3mdl_hal.cpp>
  -<hal/mock_flight_data_hal.cpp>
  -<hal/sx1262_lora_hal.cpp>
  -<hal/sx127x_lora_hal.cpp>
  -<hal/ublox_m6_gnss_hal.cpp>
  -<missions/mock_telemetry_source_task.cpp>
  -<missions/telemetry_task.cpp>
  -<sensors/gnss_task.cpp>
  -<sensors/imu_task.cpp>
  -<sensors/magnetometer_task.cpp>
build_flags =
  -I protocol/include
  -D NURA_DISABLE_LORA=1
  -D NURA_DISABLE_GPS=1
  -D NURA_DISABLE_LOWG_IMU=1
  -D NURA_DISABLE_MAGNETOMETER=1
  -D NURA_DISABLE_PYRO2=1

; Flight application with real sensors, pyro, SD logging, and program/QSPI flash
; logging paths intact. LoRa, GPS, LSM6DSO32, the absent LIS3MDL magnetometer,
; and Pyro2 are intentionally disabled.
[env:main]
build_flags =
  ${env.build_flags}
  -D LOG_LEVEL=0

; Same no-radio/no-GPS application with Serial diagnostics enabled.
[env:debug]
build_flags =
  ${env.build_flags}
  -D LOG_LEVEL=3

; Automatic state-transition bench build for serial/SD log verification.
; Not a flight build.
[env:auto_debug]
build_flags =
  ${env:debug.build_flags}
  -D NURA_BENCH_FSM_AUTOFLOW=1
  -D NURA_BENCH_SD_SERIAL_DUMP=1

; Read-only helper: dumps the latest /NURA_LOG/FLxxx.NLG from microSD over USB
; serial without creating a new flight log file.
[env:sd_dump_latest]
build_src_filter =
  -<*>
  +<../test/embedded/sd_dump_latest_main.cpp>
build_flags =
  ${env.build_flags}
