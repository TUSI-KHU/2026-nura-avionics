<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">2026 NURA Avionics project architecture</title>
  <desc id="desc">GitHub style overview diagram for the Teensy 4.1 Arduino flight controller project structure.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0969da"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f883d"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cf222e"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #d0d7de; stroke-width: 1.3; }
      .card-blue { fill: #ddf4ff; stroke: #54aeff; stroke-width: 1.4; }
      .card-green { fill: #dafbe1; stroke: #4ac26b; stroke-width: 1.4; }
      .card-red { fill: #ffebe9; stroke: #ff8182; stroke-width: 1.4; }
      .card-yellow { fill: #fff8c5; stroke: #d4a72c; stroke-width: 1.4; }
      .title { fill: #24292f; font-family: Arial, sans-serif; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #57606a; font-family: Arial, sans-serif; font-size: 16px; }
      .section { fill: #24292f; font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .label { fill: #24292f; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .body { fill: #57606a; font-family: Arial, sans-serif; font-size: 12.5px; }
      .mono { fill: #24292f; font-family: monospace; font-size: 12.5px; font-weight: 700; }
      .badge { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
      .badge-text { fill: #24292f; font-family: monospace; font-size: 12px; font-weight: 700; }
      .note { fill: #57606a; font-family: monospace; font-size: 11.5px; }
      .arrow-blue { fill: none; stroke: #0969da; stroke-width: 2; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #1f883d; stroke-width: 2; marker-end: url(#arrow-green); }
      .arrow-red { fill: none; stroke: #cf222e; stroke-width: 2; marker-end: url(#arrow-red); }
      .line { fill: none; stroke: #8c959f; stroke-width: 1.5; stroke-dasharray: 5 5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>

  <rect class="panel" x="32" y="28" width="1136" height="112" rx="8"/>
  <text class="title" x="58" y="75">2026 NURA Avionics</text>
  <text class="subtitle" x="60" y="104">Teensy 4.1 + Arduino flight controller with cooperative scheduling, explicit state stores, and HAL boundaries</text>
  <rect class="badge" x="827" y="53" width="106" height="28" rx="14"/>
  <text class="badge-text" x="846" y="72">teensy41</text>
  <rect class="badge" x="946" y="53" width="93" height="28" rx="14"/>
  <text class="badge-text" x="965" y="72">Arduino</text>
  <rect class="badge" x="1052" y="53" width="86" height="28" rx="14"/>
  <text class="badge-text" x="1070" y="72">PIO</text>

  <rect class="panel" x="50" y="170" width="260" height="292" rx="8"/>
  <text class="section" x="72" y="202">Entry &amp; Composition</text>
  <rect class="card-blue" x="72" y="224" width="216" height="70" rx="6"/>
  <text class="mono" x="92" y="252">src/main.cpp</text>
  <text class="body" x="92" y="274">forwards setup()/loop()</text>
  <rect class="card" x="72" y="328" width="216" height="96" rx="6"/>
  <text class="mono" x="92" y="356">FlightControllerApp</text>
  <text class="body" x="92" y="378">owns config, scheduler,</text>
  <text class="body" x="92" y="397">states, HALs, and tasks</text>

  <rect class="panel" x="356" y="170" width="294" height="292" rx="8"/>
  <text class="section" x="378" y="202">Core Runtime</text>
  <rect class="card-green" x="378" y="224" width="250" height="72" rx="6"/>
  <text class="mono" x="398" y="252">Scheduler</text>
  <text class="body" x="398" y="274">fixed task table, periodic tick</text>
  <rect class="card" x="378" y="316" width="118" height="62" rx="6"/>
  <text class="mono" x="398" y="343">Task</text>
  <text class="body" x="398" y="362">common API</text>
  <rect class="card" x="510" y="316" width="118" height="62" rx="6"/>
  <text class="mono" x="530" y="343">Logger</text>
  <text class="body" x="530" y="362">ring buffer</text>
  <rect class="card" x="378" y="394" width="250" height="44" rx="6"/>
  <text class="mono" x="398" y="422">RecoverableTask health policy</text>

  <rect class="panel" x="696" y="170" width="454" height="292" rx="8"/>
  <text class="section" x="718" y="202">Scheduled Tasks</text>
  <rect class="card-blue" x="718" y="224" width="190" height="72" rx="6"/>
  <text class="mono" x="738" y="252">IMUTask</text>
  <text class="body" x="738" y="274">samples MPU6050</text>
  <rect class="card-yellow" x="932" y="224" width="190" height="72" rx="6"/>
  <text class="mono" x="952" y="252">WatchdogTask</text>
  <text class="body" x="952" y="274">recovery + abort</text>
  <rect class="card" x="718" y="328" width="190" height="72" rx="6"/>
  <text class="mono" x="738" y="356">LoggerTask</text>
  <text class="body" x="738" y="378">drains log queue</text>
  <rect class="card-red" x="932" y="328" width="190" height="72" rx="6"/>
  <text class="mono" x="952" y="356">FSMTask</text>
  <text class="body" x="952" y="378">BOOT to SAFE states</text>
  <text class="note" x="720" y="432">registered order: imu -> watchdog -> fsm -> logger</text>

  <rect class="panel" x="50" y="520" width="520" height="168" rx="8"/>
  <text class="section" x="72" y="552">State Stores</text>
  <rect class="card" x="72" y="574" width="142" height="72" rx="6"/>
  <text class="mono" x="92" y="602">ImuState</text>
  <text class="body" x="92" y="624">latest sensor sample</text>
  <rect class="card" x="238" y="574" width="142" height="72" rx="6"/>
  <text class="mono" x="258" y="602">AbortState</text>
  <text class="body" x="258" y="624">global abort flag</text>
  <rect class="card" x="404" y="574" width="142" height="72" rx="6"/>
  <text class="mono" x="424" y="602">FlightState</text>
  <text class="body" x="424" y="624">mission phase</text>
  <text class="note" x="72" y="668">small structs shared by tasks instead of one global context</text>

  <rect class="panel" x="620" y="520" width="530" height="168" rx="8"/>
  <text class="section" x="642" y="552">Hardware Abstraction Layer</text>
  <rect class="card" x="642" y="574" width="150" height="72" rx="6"/>
  <text class="mono" x="662" y="602">MPU6050HAL</text>
  <text class="body" x="662" y="624">Wire / I2C burst read</text>
  <rect class="card" x="816" y="574" width="150" height="72" rx="6"/>
  <text class="mono" x="836" y="602">SerialLogOutput</text>
  <text class="body" x="836" y="624">USB serial logs</text>
  <rect class="card" x="990" y="574" width="138" height="72" rx="6"/>
  <text class="mono" x="1010" y="602">PanicHandler</text>
  <text class="body" x="1010" y="624">status LED blink</text>
  <text class="note" x="642" y="668">board constants come from DefaultAppConfig</text>

  <path class="arrow-blue" d="M 180 294 L 180 326"/>
  <path class="arrow-blue" d="M 288 376 C 322 376 322 260 376 260"/>
  <path class="arrow-blue" d="M 628 260 C 654 260 668 260 696 260"/>

  <path class="arrow-green" d="M 820 462 C 820 492 310 492 310 520"/>
  <path class="arrow-green" d="M 1016 462 C 1016 492 476 492 476 520"/>
  <path class="arrow-red" d="M 980 462 C 980 494 886 494 886 520"/>

  <path class="line" d="M 503 296 L 503 394"/>
  <rect class="bg" x="590" y="477" width="232" height="18" rx="9"/>
  <text class="note" x="598" y="490">sensor data / aborts / flight phase</text>
  <rect class="bg" x="954" y="481" width="70" height="18" rx="9"/>
  <text class="note" x="962" y="494">HAL calls</text>
</svg>
