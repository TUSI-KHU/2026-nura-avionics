; NURA flight-controller build matrix.
; Only the three current hardware configurations belong here.

[platformio]
default_envs = main

[teensy_upload_retry]
upload_protocol = custom
upload_command = python3 tools/platformio_teensy_upload_retry.py $SOURCE

[env]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = ${teensy_upload_retry.upload_protocol}
upload_command = ${teensy_upload_retry.upload_command}
monitor_speed = 115200
lib_deps =
  adafruit/Adafruit LSM6DS@^4.7.4
  adafruit/Adafruit LIS3MDL@^1.2.5
  adafruit/Adafruit LIS331@^1.0.6
  mikalhart/TinyGPSPlus@^1.1.0
  jgromes/RadioLib@7.7.1
build_src_filter =
  +<*>
  -<hal/lsm6dsox_hal.cpp>
  -<hal/mock_flight_data_hal.cpp>
  -<hal/mpl3115a2_hal.cpp>
  -<hal/sx127x_lora_hal.cpp>
  -<missions/mock_telemetry_source_task.cpp>
build_flags =
  -D NURA_ENABLE_PYRO_OUTPUTS=1
  -I protocol/include

; Flight application with LoRa, program flash logging, and microSD mirror enabled.
[env:main]
build_flags =
  ${env.build_flags}
  -D LOG_LEVEL=0

; Same application configuration with Serial diagnostics enabled.
[env:debug]
build_flags =
  ${env.build_flags}
  -D LOG_LEVEL=3

; Real sensor/FSM bench build with the unverified SX1262 RXE net held low.
; Never use as a flight build until the PCB schematic confirms RXE behavior.
[env:debug_radio_bench]
build_flags =
  ${env:debug.build_flags}
  -D NURA_BENCH_SX1262_RXE_LOW=1
  -D NURA_BENCH_RADIO_TX_POWER_DBM=-9
  -D NURA_BENCH_RADIO_DOWNLINK_ONLY=1
  -D NURA_BENCH_TELEMETRY_FAST_PERIOD_MS=1000
  -D NURA_BENCH_RADIO_USE_MINIMAL_INIT=1
  -D NURA_BENCH_RADIO_TRACE=1

; SX1262/FSM diagnosis build: real sensors, LoRa RX/TX path enabled, and
; state machine forced through the bench flow so stalls are easy to localize.
; This is not a flight build.
[env:debug_radio_flow]
build_flags =
  ${env:debug.build_flags}
  -D NURA_DISABLE_LORA=1
  -D NURA_BENCH_SX1262_RXE_LOW=1
  -D NURA_BENCH_RADIO_TX_POWER_DBM=2
  -D NURA_BENCH_TELEMETRY_FAST_PERIOD_MS=1000
  -D NURA_BENCH_RADIO_USE_MINIMAL_INIT=1
  -D NURA_BENCH_FSM_AUTOFLOW=1
  -D NURA_BENCH_ALLOW_RADIO_INIT_FAILURE=1
  -D NURA_BENCH_RADIO_TRACE=1
  -D NURA_BENCH_SCHEDULER_TRACE=1

; Real-board sensor/FSM diagnostic build with microSD logging but no LoRa.
[env:debug_no_lora]
build_flags =
  ${env:debug.build_flags}
  -D NURA_DISABLE_LORA=1

; Destructive bench test for the Teensy 4.1 underside W25Q128 QSPI flash.
; It formats/mounts LittleFS, writes deterministic data, reads it back, and
; repeats enough cycles to catch intermittent solder/contact failures.
[env:w25q128_qspi_test]
build_src_filter =
  -<*>
  +<../test/embedded/w25q128_qspi_flash_test_main.cpp>
build_flags =
  ${env.build_flags}

[env:bmp180_diagnostic]
build_src_filter =
  -<*>
  +<hal/bmp180_hal.cpp>
  +<../test/embedded/bmp180_diagnostic_main.cpp>
build_flags =
  ${env.build_flags}

[env:storage_logger_test]
build_src_filter =
  -<*>
  +<core/logger/logger.cpp>
  +<logging/flight_log_mirror_storage.cpp>
  +<logging/flight_log_ram_buffer.cpp>
  +<logging/flight_log_record.cpp>
  +<logging/program_flash_flight_log_storage.cpp>
  +<logging/sd_flight_log_storage.cpp>
  +<missions/flight_log_task.cpp>
  +<../test/embedded/storage_logger_main.cpp>
build_flags =
  ${env.build_flags}

[env:pyro_output_test]
build_src_filter =
  -<*>
  +<hal/mosfet_pyro_hal.cpp>
  +<../test/embedded/pyro_output_test_main.cpp>
lib_deps =
build_flags =
  ${env.build_flags}

; Bench-only GPIO hold test. This continuously drives the Pyro output GPIOs high.
[env:pyro_pins_hold_high]
build_src_filter =
  -<*>
  +<../test/embedded/pyro_pins_hold_high_main.cpp>
lib_deps =
build_flags =
  ${env.build_flags}
