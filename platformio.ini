; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:build]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
lib_deps = 
  adafruit/Adafruit MPU6050@^2.2.9
  adafruit/Adafruit LSM6DS@^4.7.4
  adafruit/Adafruit LIS3MDL@^1.2.5
  adafruit/Adafruit LIS331@^1.0.6
  adafruit/Adafruit MPL3115A2 Library@^2.1.2
  robtillaart/MS5611@^0.5.1
  mikalhart/TinyGPSPlus@^1.1.0
  sandeepmistry/LoRa@^0.8.0
test_build_src = yes

build_flags = 
  -D LOG_LEVEL=0

[env:debug]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
lib_deps = 
  adafruit/Adafruit MPU6050@^2.2.9
  adafruit/Adafruit LSM6DS@^4.7.4
  adafruit/Adafruit LIS3MDL@^1.2.5
  adafruit/Adafruit LIS331@^1.0.6
  adafruit/Adafruit MPL3115A2 Library@^2.1.2
  robtillaart/MS5611@^0.5.1
  mikalhart/TinyGPSPlus@^1.1.0
  sandeepmistry/LoRa@^0.8.0
test_build_src = yes

build_flags = 
  -D LOG_LEVEL=3

[env:gnss_state_test]
platform = teensy
board = teensy41
framework = arduino
upload_port = COM5
monitor_port = COM5
monitor_speed = 115200
lib_deps =
  mikalhart/TinyGPSPlus@^1.1.0
build_src_filter =
  -<*>
  +<gnss_test_main.cpp>
  +<hal/ublox_m6_gnss_hal.cpp>
  +<sensors/gnss_task.cpp>
