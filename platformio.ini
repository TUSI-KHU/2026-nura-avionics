[env:mock_test]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
lib_deps =
  sandeepmistry/LoRa@^0.8.0
test_build_src = yes
build_src_filter =
  -<*>
  +<main.cpp>
  +<app/app_config.cpp>
  +<app/flight_controller_app.cpp>
  +<core/logger/logger.cpp>
  +<core/recoverable_task/recoverable_task.cpp>
  +<core/scheduler.cpp>
  +<hal/mock_flight_data_hal.cpp>
  +<hal/panic_handler.cpp>
  +<hal/serial_log_output.cpp>
  +<hal/sx127x_lora_hal.cpp>
  +<logging/flight_log_mirror_storage.cpp>
  +<logging/flight_log_ram_buffer.cpp>
  +<logging/flight_log_record.cpp>
  +<logging/sd_flight_log_storage.cpp>
  +<missions/flight_log_task.cpp>
  +<missions/fsm_task.cpp>
  +<missions/logger_task.cpp>
  +<missions/mock_telemetry_source_task.cpp>
  +<missions/telemetry_task.cpp>
  +<missions/watchdog_task.cpp>

build_flags =
  -D LOG_LEVEL=3
  -D NURA_MOCK_TELEMETRY=1
  -D NURA_MOCK_AUTO_ARM=1
  -D NURA_MOCK_SCENARIO_ID=0
  -D NURA_DEV_SX1278=1
  -I protocol/include
